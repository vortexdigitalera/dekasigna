name: build-dekasigna-usb

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools zip

      - name: Build USB image
        run: |
          chmod +x scripts/build-usb.sh
          bash scripts/build-usb.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dekasigna-usb
          path: |
            artifacts/dekasigna-usb.img
            artifacts/dekasigna-usb.zip
